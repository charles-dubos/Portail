<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="monSite">
    <meta name="author" content="Charles">
    <title>{{title}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css" integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <!-- Font Awesome icons (free version)-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script>
    <script src="{{url_for('static', filename='js/scripts.js')}}"></script>
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}">
    <!-- <link rel="stylesheet" href="static/css/heading.css">
    <link rel="stylesheet" href="static/css/body.css"> -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    {% block head %}{% endblock head %}
</head>
<body>

<div class="header">
    <div class="pure-g home-menu header-menu">
        <div class="pure-u-1-3 is-left">
            <a class="pure-menu-heading" href="">{{title}}</a>
        </div>
        <div class="pure-u-1-3 landscape is-center">
            <ul class="pure-menu-list pure-menu-horizontal">{{ nav('landscape') }}</ul>
        </div>
        <div class="pure-u-1-3 is-right">
            <ul class="pure-menu-list pure-menu-horizontal">
                {% block servers %}{% endblock servers %}
            </ul>
        </div>
    </div>    
</div>

<div class="content-wrapper">
    {% block cards %}{% endblock cards %}
</div>

<div class="footer home-menu portrait pure-g is-center">
    {{ nav() }}
</div>

</body>
</html>
